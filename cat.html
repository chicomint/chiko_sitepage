<!DOCTYPE html>

<head>
    <title>chicomint'site - Random Cat</title>

    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css?v=0.2">

    <script>
        window.onload = function () {
            let burger = document.getElementById("burger");
            burger.addEventListener("keydown", (event) => {
                if (event.code == "Escape") burger.removeAttribute("open");
            });
            loadCats(4);
        };

        function loadCats(n) {
            const grid = document.getElementById("cat-grid");
            grid.innerHTML = "";
            const total = Math.min(Math.max(parseInt(n) || 1, 1), 12);
            for (let i = 0; i < total; i++) {
                const img = document.createElement("img");
                img.src = "https://cataas.com/cat?rand=" + Date.now() + i + Math.random();
                img.alt = "Random Cat #" + (i + 1);
                img.style.width = "200px";
                img.style.height = "200px";
                img.style.objectFit = "cover";

                grid.appendChild(img);
            }
        }

        function onRandomize() {
            loadCats(document.getElementById("cat-count").value);
        }
    </script>
</head>
