<!DOCTYPE html>
<html lang="en">

<head>
     <title>chicomint'site</title>
     <link rel="shortcut icon" type="image/x-icon" href="media/chiki.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <link rel="stylesheet" href="style.css?v=0.2">
   <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/sakura.css/css/sakura.css" type="text/css">
<link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura.css" media="screen" />
<link rel="stylesheet" href="https://unpkg.com/sakura.css/css/sakura-dark.css" media="screen and (prefers-color-scheme: dark)" />
 <script>
        window.onload = function () {
            let burger = document.getElementById("burger");
            burger.addEventListener("keydown", (event) => {
                if (event.code == "Escape") burger.removeAttribute("open");
            });
            loadCats(4);
        };

        function loadCats(n) {
            const grid = document.getElementById("cat-grid");
            grid.innerHTML = "";
            const total = Math.min(Math.max(parseInt(n) || 1, 1), 12);
            for (let i = 0; i < total; i++) {
                const img = document.createElement("img");
                img.src = "https://cataas.com/cat?rand=" + Date.now() + i + Math.random();
                img.alt = "Random Cat #" + (i + 1);
                img.style.width = "200px";
                img.style.height = "200px";
                img.style.objectFit = "cover";

                grid.appendChild(img);
            }
        }

        function onRandomize() {
            loadCats(document.getElementById("cat-count").value);
        }
    </script>
</head>

<body>
    
   <h1>Chicomint~!</h1>
     <a href="index.html" >Homepage</a>/<a href="project.html">project</a>/<a href="credits.html">credits</a>/<a href="cat.html" style="color: greenyellow;">Cat_Rng. ;3</a>
     <hr>

            <p>
                How many pic do u want(1-12):
                <input type="number" id="cat-count" value="4" min="1" max="12" style="width:50px;">
                <button onclick="onRandomize()">Random it!</button>
            </p>

            <div id="cat-grid" style="display:flex; flex-wrap:wrap; gap:10px; margin-top:10px;"></div>
        </main>
</body>
